<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Surprise for Kappy 💖</title>
    <!-- GSAP is essential for the animations we added to cause.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link rel="stylesheet" href="./cause.css">
</head>
<body>
    <!-- Background Music Player -->
    <div class="music-player">
        <audio id="bg-music" loop>
            <source src="song.mp3" type="audio/mpeg">
        </audio>
        <button id="music-toggle" class="music-btn">🎵 Play Music</button>
    </div>
    <!-- Custom Cursor (The heart that follows her mouse) -->
    <div class="custom-cursor">
        <svg viewBox="0 0 24 24">
            <path fill="#ff69b4" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
    </div>

    <!-- STARTING SECTION (The first thing she sees) -->
    <section class="hero-section">
        <div class="hero-content">
            <h1>HAPPY 17th BIRTHDAY KAPPY! 💖</h1>
            <p class="scroll-hint">Scroll down for your surprise... ↓</p>
        </div>
    </section>

    <!-- MAIN CONTAINER (The Letter and the Button) -->
    <div class="container">
        
        <!-- The JS in cause.js will automatically build your letter inside this div -->
        <div id="reasons-container"></div>

        <!-- NEW: BUTTON TO GALLERY PAGE -->
        <div class="button-wrapper">
            <a href="gallery.html" class="gallery-button">Our Story in Photos 📸</a>
        </div>

        <!-- ENDING SECTION (The Teddy Hug) -->
        <div class="ending-section">
            <div class="teddy-hug">
                <!-- Make sure d1.jpg is in your folder! -->
                <img src="mnk.jpeg" alt="A special hug">
            </div>
            <div class="ending-text">You're the BESTEST ! 💖</div>
        </div>
    </div>

    <!-- Links to your JavaScript file -->
    <script src="cause.js"></script>
</body> 
</html>
